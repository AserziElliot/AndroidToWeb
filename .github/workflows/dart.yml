name: Compilar APK de Flutter

on:
  push:
    branches: [ main, master ] # Se ejecutará cada vez que subas código
  workflow_dispatch: # Permite compilar manualmente pulsando un botón

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Instalar dependencias
      working-directory: AndroidToWeb-main # Se mueve directo a la carpeta del proyecto
      run: |
        flutter pub get
        flutter pub add flutter_webrtc web_socket_channel

    - name: Construir APK
      working-directory: AndroidToWeb-main # Se mueve directo a la carpeta del proyecto
      run: flutter build apk --release

    - name: Subir APK terminada
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: AndroidToWeb-main/build/app/outputs/flutter-apk/app-release.apk
