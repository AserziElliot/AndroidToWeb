name: Compilar APK de Flutter

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Descubrir Ruta y Compilar APK
      run: |
        export FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true
        
        # 1. Localizar la carpeta real del proyecto
        RUTA_PROYECTO=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
        echo "🚀 Proyecto detectado en la ruta: $RUTA_PROYECTO"
        
        # 2. Moverse a la carpeta e instalar dependencias
        cd $RUTA_PROYECTO
        flutter pub get
        flutter pub add flutter_webrtc web_socket_channel
        
        # 3. Compilar la APK
        flutter build apk --release
        
        # 4. Guardar la ruta exacta de la APK en el entorno de GitHub
        echo "RUTA_APK=$RUTA_PROYECTO/build/app/outputs/flutter-apk/app-release.apk" >> $GITHUB_ENV

    - name: Subir APK terminada
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: ${{ env.RUTA_APK }}
